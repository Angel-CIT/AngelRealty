name: Auto-deploy to main

on:
  push:
    branches:
      - claude/real-estate-website-ogxpa9

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/claude/real-estate-website-ogxpa9 --no-edit
          git push origin main
